<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Document</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <p id="bericht">Begin met klikken!</p>
    <audio id="klikGeluid" src="sounds/click.mp3"></audio>
    
    <h1>Diamant Clicker</h1>
    <p>Diamanten: <span id="scoretekst">0</span></p>
    
    <img id="diamant" src="images/Diamant.png" alt="diamant" />
    
    <img id="goudendiamant" src="images/Gouden Diamant.png" />
    
    <div id="menu">
      <h2>UPGRADES</h2>
    
      <button id="upgradeKlein">+1 per klik (10)</button>
      <button id="upgradeMiddel">+5 per klik (25)</button>
      <button id="upgradeGroot">+10 per klik (50)</button>
    
      <button id="pikhouweelknop">Pikhouweel (100)</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
